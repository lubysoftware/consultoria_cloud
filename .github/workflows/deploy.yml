name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  BUILD_DIR: 'dist'

jobs:
  build-and-deploy:
    name: Build and Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run linter
        run: bun run lint
        continue-on-error: true

      - name: Resolve base path
        run: |
          BASE_PATH="${{ secrets.DEPLOY_DIR }}"
          if [ -z "$BASE_PATH" ]; then
            BASE_PATH="/"
          fi
          if [ "${BASE_PATH:0:1}" != "/" ]; then
            BASE_PATH="/$BASE_PATH"
          fi
          if [ "$BASE_PATH" != "/" ] && [ "${BASE_PATH: -1}" != "/" ]; then
            BASE_PATH="$BASE_PATH/"
          fi
          echo "Resolved BASE_PATH: $BASE_PATH"
          echo "VITE_BASE_PATH=$BASE_PATH" >> $GITHUB_ENV

      - name: Validate Supabase env
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ] || [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "Error: Missing Supabase secrets (VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY)"
            exit 1
          fi

      - name: Create .env.production for build
        run: |
          cat <<EOF > .env.production
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH=${{ env.VITE_BASE_PATH }}
          EOF

      - name: Build application
        run: |
          echo "Building with BASE_PATH: $VITE_BASE_PATH"
          bun run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify build output
        run: |
          if [ ! -d "${{ env.BUILD_DIR }}" ]; then
            echo "Error: Build directory not found"
            exit 1
          fi
          echo "Build artifacts:"
          ls -lah ${{ env.BUILD_DIR }}

      - name: Copy build files to server
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "dist/*"
          target: "${{ secrets.DEPLOY_PATH }}"
          rm: true

      - name: Deployment summary
        run: |
          echo "Build completed successfully"
          echo "Artifacts deployed to: ${{ secrets.DEPLOY_PATH }}"
          echo "Application is live!"

      - name: Notify Discord - Success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "Deploy Concluido com Sucesso",
                "description": "A aplicacao foi buildada e deployada com sucesso!",
                "color": 3066993,
                "fields": [
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Autor", "value": "${{ github.actor }}", "inline": true},
                  {"name": "Servidor", "value": "${{ secrets.SSH_HOST }}", "inline": true},
                  {"name": "Caminho", "value": "${{ secrets.DEPLOY_PATH }}", "inline": true}
                ],
                "footer": {"text": "GitHub Actions"}
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Discord - Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "Deploy Falhou",
                "description": "O deploy da aplicacao falhou. Verifique os logs.",
                "color": 15158332,
                "fields": [
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Autor", "value": "${{ github.actor }}", "inline": true},
                  {"name": "Workflow", "value": "[Ver logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ],
                "footer": {"text": "GitHub Actions"}
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun run test

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests (real API – URL de produção)
        run: bun run test:e2e:real
        env:
          CI: "true"
          E2E_SKIP_WEBSERVER: "1"
          E2E_BASE_URL: ${{ secrets.APP_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Notify Discord - Tests Success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -H "Content-Type: application/json" -d '{
              "embeds": [{
                "title": "Testes concluídos com sucesso",
                "description": "Todos os testes (unitários e E2E) passaram.",
                "color": 3066993,
                "fields": [
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Autor", "value": "${{ github.actor }}", "inline": true},
                  {"name": "Workflow", "value": "[Ver logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ],
                "footer": {"text": "GitHub Actions - Testes"}
              }]
            }' "$DISCORD_WEBHOOK_URL"
          fi

      - name: Notify Discord - Tests Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -H "Content-Type: application/json" -d '{
              "embeds": [{
                "title": "Testes falharam",
                "description": "Um ou mais testes (unitários ou E2E) falharam. Verifique os logs do job de testes.",
                "color": 15158332,
                "fields": [
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Autor", "value": "${{ github.actor }}", "inline": true},
                  {"name": "Workflow", "value": "[Ver logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ],
                "footer": {"text": "GitHub Actions - Testes"}
              }]
            }' "$DISCORD_WEBHOOK_URL"
          fi
